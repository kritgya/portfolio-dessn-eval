<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Folio</title>
    <script>
      // GH Pages SPA fallback: redirect deep links back to index with hash preserved.
      // Without this, refreshing on /positions/p3 returns a 404.
      var segmentCount = 1; // matches the repo-name segment in the URL
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
